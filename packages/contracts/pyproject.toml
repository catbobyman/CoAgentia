[project]
name = "coagentia-contracts"
version = "0.1.0"
description = "CoAgentia contracts package: the single Pydantic source of truth (M1 contracts A-E)"
requires-python = ">=3.12"
dependencies = ["pydantic>=2.7"]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/coagentia_contracts"]
